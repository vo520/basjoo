# ============================================
# Basjoo Docker Compose 配置
# 使用 Profile 区分环境：
#   - 生产: docker compose --profile prod up -d
#   - 开发: docker compose --profile dev up -d
# ============================================

services:
  # ============================================
  # 基础设施服务 (所有环境共用)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: basjoo-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod", "dev"]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: basjoo-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c max_connections=1024
    profiles: ["prod", "dev"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: basjoo-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod", "dev"]

  scrapling-service:
    build:
      context: ./scrapling-service
      dockerfile: Dockerfile
    container_name: basjoo-scrapling
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles: ["prod", "dev"]

  # ============================================
  # 生产环境服务
  # ============================================
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basjoo-backend
    environment:
      - DATABASE_URL=sqlite:////app/data/basjoo.db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=${SECRET_KEY:-}
      - SECRET_KEY_FILE=${SECRET_KEY_FILE:-/app/data/.secret_key}
      - DEFAULT_AGENT_ID=${DEFAULT_AGENT_ID:-}
      - REQUIRE_SECRET_KEY=${REQUIRE_SECRET_KEY:-true}
      - "ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}"
      - "ALLOWED_METHODS=${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}"
      - "ALLOWED_HEADERS=${ALLOWED_HEADERS:-Content-Type,Authorization,X-Requested-With,Accept}"
      - DEFAULT_RATE_LIMIT=1000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-/app/data/.encryption_key}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1000}
      - RATE_LIMIT_BURST_SIZE=${RATE_LIMIT_BURST_SIZE:-200}
      - LOG_LEVEL=INFO
      - SCRAPLING_SERVICE_URL=http://scrapling-service:8001
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      scrapling-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: ["prod"]

  frontend-prod:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_PROXY_TARGET: http://backend-prod:8000
    container_name: basjoo-frontend
    restart: unless-stopped
    networks:
      - basjoo-network
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - BACKEND_PROXY_TARGET=http://backend-prod:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ["prod"]
    depends_on:
      - backend-prod

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: basjoo-nginx
    environment:
      - SERVER_DOMAIN=${SERVER_DOMAIN:-}
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend-prod:
        condition: service_healthy
      frontend-prod:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    profiles: ["prod"]

  # ============================================
  # 开发环境服务
  # ============================================
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: basjoo-backend-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/basjoo.db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - SECRET_KEY_FILE=${SECRET_KEY_FILE:-/app/data/.secret_key}
      - DEFAULT_AGENT_ID=${DEFAULT_AGENT_ID:-}
      - ALLOWED_ORIGINS=*
      - ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - ALLOWED_HEADERS=Content-Type,Authorization,X-Requested-With,Accept
      - DEFAULT_RATE_LIMIT=10000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-/app/data/.encryption_key}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1000}
      - RATE_LIMIT_BURST_SIZE=${RATE_LIMIT_BURST_SIZE:-200}
      - LOG_LEVEL=DEBUG
      - SCRAPLING_SERVICE_URL=http://scrapling-service:8001
    volumes:
      - backend-data:/app/data
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      scrapling-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - basjoo-network
    entrypoint: ["python3", "/app/docker-entrypoint.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: ["dev"]
    develop:
      watch:
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - __pycache__/
            - "*.pyc"
            - .pytest_cache/
            - venv/
            - data/
            - .git/
        - path: ./backend/requirements.txt
          action: rebuild

  frontend-dev:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile.dev
    container_name: basjoo-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - NEXT_PUBLIC_WS_BASE_URL=
      - BACKEND_PROXY_TARGET=http://backend-dev:8000
    volumes:
      - ./frontend-nextjs:/app
      - /app/node_modules
    depends_on:
      - backend-dev
    restart: unless-stopped
    networks:
      - basjoo-network
    profiles: ["dev"]
    develop:
      watch:
        - path: ./frontend-nextjs
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/
        - path: ./frontend-nextjs/package.json
          action: rebuild

  # ============================================
  # Widget cross-origin test host services
  # ============================================
  allowed-host:
    image: nginx:alpine
    container_name: basjoo-allowed-host
    profiles: ["dev", "prod"]
    volumes:
      - ./tests/environments/host-pages/allowed-host:/usr/share/nginx/html:ro
      - ./tests/environments/host-pages/nginx-allowed.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - basjoo-network

  blocked-host:
    image: nginx:alpine
    container_name: basjoo-blocked-host
    profiles: ["dev", "prod"]
    volumes:
      - ./tests/environments/host-pages/blocked-host:/usr/share/nginx/html:ro
      - ./tests/environments/host-pages/nginx-blocked.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - basjoo-network

networks:
  basjoo-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  backend-data:
  qdrant-data:
